name: Tests

permissions:
  contents: read

on:
  push:
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - "scapi/**"
      - "tests/**"
      - ".github/workflows/*.yml"

  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - "scapi/**"
      - "tests/**"
      - ".github/workflows/*.yml"

jobs:
  tests-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Run Tests
        run: uv run pytest --cov-branch --cov=scapi --cov-report=xml --cov-report=term-missing

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  tests-windows:
    name: Windows
    runs-on: windows-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Run Tests
        run: uv run pytest --cov-branch --cov=scapi --cov-report=xml --cov-report=term-missing

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
